name: Terraform CI

on:
  push:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform-ci.yml"

env:
  TF_VERSION: "1.9.8"
  TFLINT_VERSION: "v0.55.0"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive -diff infrastructure/

  tflint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Init TFLint
        run: tflint --init
        working-directory: infrastructure/

      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error
        working-directory: infrastructure/

  validate:
    name: Validate (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - bootstrap
          - foundation
          - foundation-west
          - app
          - app-west
          - nomad
          - global
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init -backend=false
        working-directory: infrastructure/${{ matrix.module }}

      - name: terraform validate
        run: terraform validate -no-color
        working-directory: infrastructure/${{ matrix.module }}
