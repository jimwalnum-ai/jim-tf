name: Build & Push to Docker Hub

on:
  push:
    branches: ["main"]
    paths:
      - "infrastructure/web/**"
      - "infrastructure/code/**"
      - "infrastructure/security-agent/**"
      - "infrastructure/security-dashboard/**"
      - "infrastructure/observability-dashboard/**"
      - ".github/workflows/docker-build-push.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "infrastructure/web/**"
      - "infrastructure/code/**"
      - "infrastructure/security-agent/**"
      - "infrastructure/security-dashboard/**"
      - "infrastructure/observability-dashboard/**"
      - ".github/workflows/docker-build-push.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: flask-app
            context: infrastructure/web
            dockerfile: infrastructure/web/Dockerfile

          - image: factor-worker
            context: infrastructure/code
            dockerfile: infrastructure/code/docker/Dockerfile

          - image: cilium-security-agent
            context: infrastructure/security-agent
            dockerfile: infrastructure/security-agent/Dockerfile

          - image: cilium-security-dashboard
            context: infrastructure/security-dashboard
            dockerfile: infrastructure/security-dashboard/Dockerfile

          - image: observability-dashboard
            context: infrastructure/observability-dashboard
            dockerfile: infrastructure/observability-dashboard/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            jimwalnum/${{ matrix.image }}:latest
            jimwalnum/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false
