name: Build & Push to Docker Hub and ECR

on:
  push:
    branches: ["main"]
    paths:
      - "infrastructure/web/**"
      - "infrastructure/code/**"
      - "infrastructure/code-ts/**"
      - "infrastructure/security-agent/**"
      - "infrastructure/security-dashboard/**"
      - "infrastructure/observability-dashboard/**"
      - ".github/workflows/docker-build-push.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "infrastructure/web/**"
      - "infrastructure/code/**"
      - "infrastructure/code-ts/**"
      - "infrastructure/security-agent/**"
      - "infrastructure/security-dashboard/**"
      - "infrastructure/observability-dashboard/**"
      - ".github/workflows/docker-build-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for OIDC → ECR push

env:
  AWS_REGION: us-east-1

jobs:
  build-push:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: flask-app
            context: infrastructure/web
            dockerfile: infrastructure/web/Dockerfile

          - image: factor-worker
            context: infrastructure/code
            dockerfile: infrastructure/code/docker/Dockerfile

          - image: factor-process
            context: infrastructure/code
            dockerfile: infrastructure/code/process/Dockerfile

          - image: factor-persist
            context: infrastructure/code
            dockerfile: infrastructure/code/persist/Dockerfile

          - image: factor-test-msg
            context: infrastructure/code
            dockerfile: infrastructure/code/test_msg/Dockerfile

          - image: cilium-security-agent
            context: infrastructure/security-agent
            dockerfile: infrastructure/security-agent/Dockerfile

          - image: cilium-security-dashboard
            context: infrastructure/security-dashboard
            dockerfile: infrastructure/security-dashboard/Dockerfile

          - image: observability-dashboard
            context: infrastructure/observability-dashboard
            dockerfile: infrastructure/observability-dashboard/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            jimwalnum/${{ matrix.image }}:latest
            jimwalnum/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

      # ECR push — only on pushes to main (OIDC trust policy restricts to main)
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ matrix.image }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          provenance: false
